<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agentic OS · Gutthann HIW</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--c-navy-900:#16181D;--c-navy-800:#16181D;--c-navy-700:#565A62;--c-blue-700:#9E3D20;--c-blue-600:#BE4D2C;--c-blue-500:#BE4D2C;--c-blue-400:#D49A86;--c-blue-200:#9094A8;--c-blue-100:#F3E2DB;--c-blue-50:#F3E2DB;--c-slate-900:#16181D;--c-slate-800:#16181D;--c-slate-700:#565A62;--c-slate-600:#565A62;--c-slate-500:#9094A8;--c-slate-400:#9094A8;--c-slate-300:#D6D2C7;--c-slate-200:#E7E4DC;--c-slate-100:#F4F2EC;--c-slate-50:#FAF9F6;--c-white:#FFF;--c-success:#3E7A53;--c-success-bg:#E0EBE2;--c-warning:#BC8420;--c-warning-bg:#F2E9D4;--c-danger:#B23B3B;--c-danger-bg:#F2DEDD;--c-amber:#C6A24E;--c-amber-bg:#FBF3DD;--r-sm:2px;--r-md:4px;--r-lg:6px;--s2:8px;--s3:12px;--s4:16px;--s5:20px;--s6:24px;--s8:32px;--f-sans:'Archivo',system-ui,sans-serif;--f-mono:'IBM Plex Mono',ui-monospace,monospace;--sh:0 1px 2px rgba(22,24,29,.04),0 1px 3px rgba(22,24,29,.05)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f-sans);font-size:13px;line-height:1.5;color:var(--c-slate-800);background:#F1EFEA;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}.mono{font-family:var(--f-mono)}
.top{background:var(--c-white);border-bottom:1px solid var(--c-slate-200);padding:11px 22px;display:flex;align-items:center;gap:13px;position:sticky;top:0;z-index:20}
.top .brand{font-family:var(--f-mono);font-size:11px;letter-spacing:1.3px;text-transform:uppercase;color:var(--c-blue-600);font-weight:600}
.top .crumb{font-size:14px;font-weight:600}.top .crumb a{color:var(--c-slate-500);cursor:pointer}.top .crumb a:hover{color:var(--c-blue-600)}
.top .sep{color:var(--c-slate-400);margin:0 7px}.top .right{margin-left:auto;display:flex;align-items:center;gap:12px}
.top .user{font-family:var(--f-mono);font-size:11px;color:var(--c-slate-600)}
.rstatus{font-family:var(--f-mono);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:3px 9px;border-radius:11px;display:flex;align-items:center;gap:6px}
.rstatus.on{background:var(--c-success-bg);color:var(--c-success)}.rstatus.off{background:var(--c-slate-100);color:var(--c-slate-500)}
.rstatus .d{width:6px;height:6px;border-radius:50%;background:currentColor}
.lnk{font:inherit;font-size:11px;background:none;border:none;color:var(--c-blue-600);text-decoration:underline;padding:0}
.layout{display:flex;align-items:flex-start}
.main{flex:1;min-width:0;padding:22px 24px 60px;max-width:1180px;margin:0 auto}
.sidebar{width:300px;flex:0 0 300px;border-right:1px solid var(--c-slate-200);background:var(--c-slate-50);min-height:calc(100vh - 47px);padding:18px 15px;position:sticky;top:47px;overflow-y:auto;max-height:calc(100vh - 47px)}
.sb-proj-label{font-family:var(--f-mono);font-size:9.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--c-slate-500);margin:0 2px 14px;font-weight:600;line-height:1.3}
.menu-btn{display:none;background:none;border:1px solid var(--c-slate-300);border-radius:var(--r-md);padding:5px 10px;font-size:15px;color:var(--c-slate-700);line-height:1}
.sb-backdrop{display:none}
@media(max-width:980px){
  .sidebar{position:fixed;top:47px;left:0;bottom:0;z-index:40;width:290px;transform:translateX(-100%);transition:transform .22s ease;box-shadow:3px 0 16px rgba(22,24,29,.18);overflow-y:auto}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:inline-flex;align-items:center}
  .main{padding:16px 14px 60px}
  .sb-backdrop.open{display:block;position:fixed;inset:47px 0 0 0;background:rgba(22,24,29,.35);z-index:35}
}
.hdr{background:var(--c-white);border:1px solid var(--c-slate-200);border-radius:var(--r-lg);padding:18px 24px;margin-bottom:var(--s4);display:grid;grid-template-columns:1fr auto;gap:var(--s5);align-items:end;box-shadow:var(--sh)}
.hdr-brand{font-family:var(--f-mono);font-size:11px;color:var(--c-blue-600);letter-spacing:1.1px;text-transform:uppercase;font-weight:600}
.hdr-title{font-size:26px;font-weight:700;letter-spacing:-.4px;line-height:1.15;margin-top:7px;color:var(--c-navy-900)}
.hdr-meta{font-size:12px;color:var(--c-slate-600);margin-top:11px;display:flex;gap:var(--s5);flex-wrap:wrap}.hdr-meta strong{color:var(--c-navy-900);font-weight:600}
.hdr-status{text-align:right;font-size:10.5px;color:var(--c-slate-500);text-transform:uppercase;letter-spacing:.5px;font-family:var(--f-mono)}
.hdr-status .stamp{display:block;font-size:12px;color:var(--c-navy-900);margin-top:3px;text-transform:none;letter-spacing:0}
.pilgrim{background:var(--c-white);border:1px solid var(--c-slate-200);border-radius:var(--r-lg);padding:16px 22px;margin-bottom:var(--s4);box-shadow:var(--sh)}
.pilgrim-label{font-family:var(--f-mono);font-size:10px;color:var(--c-slate-500);letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-bottom:14px}
.pilgrim-track{display:grid;grid-template-columns:repeat(9,1fr);position:relative}
.pilgrim-line{position:absolute;top:15px;left:5.5%;right:5.5%;height:2px;background:var(--c-slate-200)}
.pilgrim-line-progress{position:absolute;top:15px;left:5.5%;height:2px;background:var(--c-blue-500)}
.pilgrim-station{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;padding:2px;border-radius:var(--r-sm)}
.pilgrim-station:hover{background:var(--c-slate-50)}
.pilgrim-dot{width:30px;height:30px;border-radius:50%;background:var(--c-white);border:2px solid var(--c-slate-300);display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:12px;font-weight:600;color:var(--c-slate-500)}
.pilgrim-station.done .pilgrim-dot{background:var(--c-navy-800);border-color:var(--c-navy-800);color:#fff}
.pilgrim-station.active .pilgrim-dot{background:var(--c-blue-600);border-color:var(--c-blue-600);color:#fff;box-shadow:0 0 0 5px var(--c-blue-100)}
.pilgrim-labelset{font-size:10px;text-align:center;color:var(--c-slate-500);font-weight:500;line-height:1.25}
.pilgrim-station.done .pilgrim-labelset{color:var(--c-navy-700)}.pilgrim-station.active .pilgrim-labelset{color:var(--c-navy-900);font-weight:700}
.kpi-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:var(--s3);margin-bottom:var(--s4)}
.kpi{background:var(--c-white);border:1px solid var(--c-slate-200);border-radius:var(--r-lg);padding:14px 15px;box-shadow:var(--sh)}
.kpi-label{font-family:var(--f-mono);font-size:10px;color:var(--c-slate-500);letter-spacing:.6px;text-transform:uppercase;font-weight:600;margin-bottom:8px}
.kpi-value{font-family:var(--f-mono);font-size:24px;font-weight:600;color:var(--c-navy-900);line-height:1;letter-spacing:-.5px}
.kpi-unit{font-size:12px;color:var(--c-slate-500);margin-left:3px}
.kpi-sub{font-size:10.5px;color:var(--c-slate-500);margin-top:8px}
.kpi.accent{background:linear-gradient(180deg,var(--c-blue-50),var(--c-white));border-color:#E8C9BD}.kpi.accent .kpi-value{color:var(--c-blue-700)}
.kpi.alert{background:var(--c-danger-bg);border-color:#E3B7B6}.kpi.alert .kpi-value{color:var(--c-danger)}
.kpi.warn{background:var(--c-amber-bg);border-color:#E6D29A}.kpi.warn .kpi-value{color:var(--c-warning)}
@media(max-width:1100px){.kpi-strip{grid-template-columns:repeat(3,1fr)}}
.sec{background:var(--c-white);border:1px solid var(--c-slate-200);border-radius:var(--r-lg);margin-bottom:var(--s3);overflow:hidden;box-shadow:var(--sh)}
.sec.prominent{border-color:var(--c-slate-300)}
.sec-head{width:100%;background:none;border:none;padding:13px 18px;display:grid;grid-template-columns:30px 1fr auto 18px;gap:var(--s3);align-items:center;text-align:left}
.sec-head:hover{background:var(--c-slate-50)}.sec.prominent .sec-head{background:#F4F2EC}
.sec-icon{width:26px;height:26px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--c-blue-100);color:var(--c-blue-700)}
.sec.prominent .sec-icon{background:var(--c-blue-600);color:#fff}
.sec-title{font-size:14px;font-weight:700;color:var(--c-navy-900)}.sec-summary{font-size:11px;color:var(--c-slate-500);margin-top:2px}
.sec-meta{display:flex;gap:var(--s2);align-items:center}
.stat{font-family:var(--f-mono);font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px;background:var(--c-slate-100);color:var(--c-slate-700)}
.stat.alert{background:var(--c-danger-bg);color:var(--c-danger)}.stat.warn{background:var(--c-amber-bg);color:var(--c-warning)}.stat.ok{background:var(--c-success-bg);color:var(--c-success)}
.sec-chevron{width:16px;height:16px;stroke:var(--c-slate-400);stroke-width:2.2;fill:none;transition:transform .2s}.sec.open .sec-chevron{transform:rotate(180deg)}
.sec-body{display:none;border-top:1px solid var(--c-slate-200)}.sec.open .sec-body{display:block}
.inner{padding:var(--s4) var(--s5)}
.tasks-tabs{background:var(--c-slate-50);border-bottom:1px solid var(--c-slate-200);display:flex;padding:0 var(--s5);overflow-x:auto}
.tab-btn{background:none;border:none;padding:11px 13px;font-size:12px;color:var(--c-slate-600);font-weight:600;white-space:nowrap;border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px}
.tab-btn:hover{color:var(--c-navy-800)}.tab-btn.active{color:var(--c-navy-900);border-bottom-color:var(--c-blue-600)}
.tab-count{font-family:var(--f-mono);min-width:20px;padding:2px 6px;border-radius:10px;background:var(--c-slate-200);color:var(--c-slate-700);font-size:10px;text-align:center}
.tab-btn.active .tab-count{background:var(--c-blue-600);color:#fff}
.tasks-filters{padding:9px var(--s5);border-bottom:1px solid var(--c-slate-200);display:flex;gap:var(--s3);align-items:center;flex-wrap:wrap}
.filter-label{font-family:var(--f-mono);font-size:9.5px;color:var(--c-slate-500);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.fc{background:var(--c-slate-100);border:1px solid var(--c-slate-200);color:var(--c-slate-700);padding:3px 9px;border-radius:11px;font-size:10.5px;font-weight:600;cursor:pointer}
.fc.active{background:var(--c-navy-900);border-color:var(--c-navy-900);color:#fff}.fc.s1.active{background:var(--c-danger);border-color:var(--c-danger)}.fc.s2.active{background:var(--c-amber);border-color:var(--c-amber)}
.task-card{border-bottom:1px solid var(--c-slate-200)}.task-card:last-child{border-bottom:none}.task-card.hide{display:none}.task-card.expanded{border-left:3px solid var(--c-blue-600)}
.task-head{width:100%;padding:11px var(--s5);display:grid;grid-template-columns:20px 1fr auto 16px;gap:var(--s3);align-items:center;cursor:pointer}.task-head:hover{background:var(--c-slate-50)}
.tcheck{width:18px;height:18px;accent-color:var(--c-success);cursor:pointer}
.task-title{font-size:12.5px;font-weight:600;color:var(--c-navy-900);line-height:1.35}.task-card.done .task-title{text-decoration:line-through;color:var(--c-slate-500);font-weight:500}
.task-meta-row{display:flex;gap:var(--s2);flex-wrap:wrap;align-items:center;font-size:10.5px;color:var(--c-slate-500);margin-top:3px}
.task-chip{display:inline-flex;padding:1px 7px;border-radius:var(--r-sm);font-size:10px;font-weight:600;background:var(--c-slate-100);color:var(--c-slate-700);border:1px solid var(--c-slate-200)}
.task-prio{width:20px;height:18px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:10px;font-weight:600;color:#fff}
.task-prio.p1{background:var(--c-danger)}.task-prio.p2{background:var(--c-amber)}.task-prio.p3{background:var(--c-navy-700)}
.task-chevron{width:15px;height:15px;stroke:var(--c-slate-400);stroke-width:2;fill:none;transition:transform .2s}.task-card.expanded .task-chevron{transform:rotate(180deg)}
.task-body{display:none;padding:0 var(--s5) var(--s4) 46px}.task-card.expanded .task-body{display:block}
.done-sec{border-top:1px solid var(--c-slate-200)}
.done-sum{list-style:none;cursor:pointer;padding:11px var(--s5);font-size:12px;font-weight:600;color:var(--c-success);display:flex;align-items:center;gap:8px}
.done-sum::-webkit-details-marker{display:none}.done-sum:hover{background:var(--c-slate-50)}
.done-sum svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.done-cnt{font-family:var(--f-mono);font-size:10px;background:var(--c-success-bg);color:var(--c-success);padding:2px 8px;border-radius:10px}
.done-body{background:var(--c-slate-50)}.done-body .task-title{color:var(--c-slate-500)}
/* Aufgaben-Zentrale: Master-Detail */
.aufg-split{display:flex;align-items:stretch;border-top:1px solid var(--c-slate-200)}
.aufg-list{flex:0 0 42%;max-width:450px;border-right:1px solid var(--c-slate-200);overflow-y:auto;max-height:560px}
.aufg-detail{flex:1;min-width:0;padding:var(--s5) var(--s5) var(--s6);overflow-y:auto;max-height:560px}
.task-row{display:flex;align-items:center;gap:10px;padding:9px var(--s4);border-bottom:1px solid var(--c-slate-100);cursor:pointer}
.task-row:hover{background:var(--c-slate-50)}
.task-row.sel{background:var(--c-blue-50);box-shadow:inset 3px 0 0 var(--c-blue-600)}
.task-row.done .tr-title{text-decoration:line-through;color:var(--c-slate-400)}
.task-row.hide{display:none}
.task-row .tcheck{flex-shrink:0}.task-row .task-prio{flex-shrink:0}
.tr-main{flex:1;min-width:0}
.tr-title{font-size:12.5px;font-weight:600;color:var(--c-navy-900);line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tr-meta{font-size:10px;color:var(--c-slate-500);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tr-mail{color:var(--c-blue-600);font-size:13px;flex-shrink:0}
.det-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:var(--s3)}
.det-title{font-size:16px;font-weight:700;color:var(--c-navy-900);line-height:1.3}
.det-meta{display:flex;flex-wrap:wrap;gap:var(--s3);align-items:center;font-size:11px;color:var(--c-slate-600);margin-bottom:var(--s4);padding-bottom:var(--s3);border-bottom:1px solid var(--c-slate-100)}
.det-head .det-title{flex:1}
.det-edit{flex-shrink:0;border:1px solid var(--c-slate-200);background:#fff;color:var(--c-slate-500);width:28px;height:28px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;line-height:1}
.det-edit:hover{border-color:var(--c-blue-600);color:var(--c-blue-700)}
.lockico{font-size:9px}
.det-editform{background:var(--c-slate-50);border:1px solid var(--c-slate-200);border-radius:var(--r-md);padding:12px 14px;margin:0 0 var(--s4)}
.ef-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ef-row label{font-size:11px;font-weight:600;color:var(--c-slate-600);width:96px;flex-shrink:0}
.ef-actions{display:flex;gap:8px;margin-top:4px}
.ef-hint{font-size:10px;color:var(--c-slate-400);margin-top:8px;line-height:1.4}
.det-sec{margin-bottom:var(--s4)}
.det-sec h4{font-family:var(--f-mono);font-size:9.5px;color:var(--c-slate-500);text-transform:uppercase;letter-spacing:.7px;font-weight:600;margin-bottom:6px}
.det-sec p{font-size:13px;color:var(--c-navy-800);line-height:1.55}
.mail-box{background:var(--c-slate-50);border:1px solid var(--c-slate-200);border-radius:var(--r-md);padding:var(--s3) var(--s4);font-size:12px;margin-bottom:var(--s3)}
.mail-line{padding:2px 0;color:var(--c-slate-700)}.mail-line span{font-weight:600;color:var(--c-navy-900);display:inline-block;min-width:54px}
.mail-body{white-space:pre-wrap;line-height:1.55;color:var(--c-navy-800);margin-top:8px;padding-top:8px;border-top:1px dashed var(--c-slate-200)}
.mail-gen{font-size:10.5px;color:var(--c-warning);background:var(--c-amber-bg);border-radius:var(--r-sm);padding:5px 9px;margin-bottom:8px;line-height:1.4}
.det-warn{font-size:12px;color:var(--c-danger);background:var(--c-danger-bg);border:1px solid var(--c-danger);border-radius:var(--r-sm);padding:8px 11px;margin:8px 0;line-height:1.45}
.tr-warn{color:var(--c-danger);font-size:13px;margin-left:4px}
.nt-wrap{display:flex;gap:14px;align-items:flex-start}
.nt-list{flex:0 0 200px;display:flex;flex-direction:column;gap:4px}
.nt-li{display:flex;flex-direction:column;gap:2px;text-align:left;background:var(--c-slate-50);border:1px solid var(--c-slate-200);border-radius:var(--r-md);padding:7px 9px;cursor:pointer}
.nt-li.sel{border-color:var(--c-danger);background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.nt-li-t{font-size:12px;font-weight:600;color:var(--c-slate-800);line-height:1.3}
.nt-li-s{font-size:10px;color:var(--c-warning)}.nt-li-s.ok{color:var(--c-success)}
.nt-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px}
.chat{display:flex;flex-direction:column;gap:8px;max-height:58vh;overflow-y:auto;padding:8px;background:var(--c-slate-50);border:1px solid var(--c-slate-200);border-radius:var(--r-md)}
.chat-intro{font-size:12px;color:var(--c-slate-500);padding:14px;text-align:center;line-height:1.5}
.cmsg{display:flex}.cmsg.u{justify-content:flex-end}.cmsg.a{justify-content:flex-start}
.cb{max-width:84%;padding:8px 11px;border-radius:12px;font-size:13px;line-height:1.5}
.cmsg.u .cb{background:var(--c-danger);color:#fff;border-bottom-right-radius:3px}
.cmsg.a .cb{background:#fff;border:1px solid var(--c-slate-200);color:var(--c-slate-800);border-bottom-left-radius:3px}
.cb.typing{color:var(--c-slate-500);font-style:italic}
.chat-input{display:flex;gap:8px;align-items:flex-end}
.chat-input textarea{flex:1;resize:vertical;border:1px solid var(--c-slate-300);border-radius:var(--r-md);padding:8px 10px;font:inherit;font-size:13px}
.nt-doc{border:1px solid var(--c-slate-200);border-radius:var(--r-md);padding:10px;background:#fff}
.nt-doc summary{font-weight:600;font-size:13px;cursor:pointer}
.nt-doc-body{margin-top:8px;font-size:12.5px;line-height:1.55;max-height:48vh;overflow-y:auto;border-top:1px solid var(--c-slate-100);padding-top:8px}
.mail-noaddr{color:var(--c-slate-400);font-style:italic;font-size:11px}
.mail-actions{display:flex;gap:var(--s2);flex-wrap:wrap}
.mail-hint{font-size:10px;color:var(--c-slate-400);margin-top:6px;line-height:1.4}.mail-hint em{font-style:italic;color:var(--c-slate-500)}
.mail-logo-note{font-size:9.5px;color:var(--c-slate-400);font-style:italic;margin-top:8px;padding-top:6px;border-top:1px dotted var(--c-slate-200)}

async function renderNachtraege(proj){el('crumb').textContent=short(proj.name||currentName)+' · Nachträge';
  const{data:list}=await sb.from('nachtraege').select('id,titel,status,created_at').eq('project_id',current).order('created_at',{ascending:false});
  if(selNachtrag&&!(list||[]).some(n=>n.id===selNachtrag))selNachtrag=null;
  if(!selNachtrag&&list&&list.length)selNachtrag=list[0].id;
  let h='<h1 class="page">Nachtrag-Chat</h1><div class="page-sub">Per Chat einen Nachtrag erstellen — die KI fragt gezielt nach und das Wissen fließt zurück ins Projekt.</div>';
  h+='<div class="nt-wrap"><div class="nt-list"><button class="btn-sm" id="nt-neu" style="width:100%;margin-bottom:8px">+ Neuer Nachtrag</button>';
  for(const n of(list||[]))h+='<button class="nt-li'+(n.id===selNachtrag?' sel':'')+'" data-nt="'+n.id+'"><span class="nt-li-t">'+esc(n.titel)+'</span><span class="nt-li-s '+(n.status==='fertig'?'ok':'')+'">'+(n.status==='fertig'?'fertig':'läuft')+'</span></button>';
  if(!list||!list.length)h+='<div class="empty" style="padding:14px;font-size:12px">Noch keiner.</div>';
  h+='</div><div class="nt-main" id="nt-main"></div></div>';
  el('main').innerHTML=h;
  el('nt-neu').onclick=neuerNachtrag;
  el('main').querySelectorAll('button[data-nt]').forEach(b=>b.onclick=()=>{selNachtrag=b.dataset.nt;renderNachtraege(proj);});
  if(selNachtrag)await renderNachtragChat(selNachtrag);else el('nt-main').innerHTML='<div class="empty" style="padding:34px">Klick „+ Neuer Nachtrag" und beschreibe kurz, worum es geht.</div>';}
async function neuerNachtrag(){const{data,error}=await sb.from('nachtraege').insert({project_id:current,titel:'Neuer Nachtrag'}).select('id').single();
  if(error){alert('Fehler: '+error.message);return;}selNachtrag=data.id;renderNachtraege({name:currentName});}
async function renderNachtragChat(nid){const main=el('nt-main');if(!main)return;
  const[{data:nt},{data:msgs},{data:runs}]=await Promise.all([
    sb.from('nachtraege').select('*').eq('id',nid).single(),
    sb.from('nachtrag_messages').select('role,content').eq('nachtrag_id',nid).order('created_at'),
    sb.from('agent_runs').select('status').eq('agent','nachtrag-chat').contains('meta',{nachtrag_id:nid}).in('status',['queued','running'])]);
  const busy=!!(runs&&runs.length);
  let h='<div class="chat" id="nt-chat">';
  if(!msgs||!msgs.length)h+='<div class="chat-intro">Beschreibe kurz, worum es geht — z. B. „Nachtrag wegen Mehraushub Baugrund". Die KI fragt dann gezielt nach.</div>';
  for(const m of(msgs||[]))h+='<div class="cmsg '+(m.role==='user'?'u':'a')+'"><div class="cb">'+esc(m.content).replace(/\n/g,'<br>')+'</div></div>';
  if(busy)h+='<div class="cmsg a"><div class="cb typing">KI denkt nach…</div></div>';
  h+='</div>';
  h+='<div class="chat-input"><textarea id="nt-inp" rows="2" placeholder="'+(busy?'KI antwortet…':'Nachricht… (Enter sendet, Shift+Enter = Zeile)')+'" '+(busy?'disabled':'')+'></textarea><button class="btn-sm" id="nt-send" '+(busy?'disabled':'')+'>Senden</button></div>';
  if(nt&&nt.status==='fertig'&&nt.dokument)h+='<details class="nt-doc" open><summary>📄 Erstellter Nachtrag — Entwurf</summary><div class="nt-doc-body">'+esc(nt.dokument).replace(/\n/g,'<br>')+'</div><button class="btn-sm ghost" id="nt-copy" style="margin-top:8px">Text kopieren</button></details>';
  main.innerHTML=h;
  const ch=el('nt-chat');if(ch)ch.scrollTop=ch.scrollHeight;
  const send=()=>sendNachtrag(nid);
  if(el('nt-send'))el('nt-send').onclick=send;
  const inp=el('nt-inp');if(inp){inp.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};if(!busy)inp.focus();}
  if(el('nt-copy'))el('nt-copy').onclick=()=>{if(navigator.clipboard)navigator.clipboard.writeText(nt.dokument);const b=el('nt-copy');b.textContent='✓ kopiert';setTimeout(()=>b.textContent='Text kopieren',1500);};
  clearTimeout(ntPollTimer);
  if(busy)ntPollTimer=setTimeout(()=>{if(view==='project'&&pview==='nachtraege'&&selNachtrag===nid)renderNachtragChat(nid);},3000);}
async function sendNachtrag(nid){const inp=el('nt-inp');if(!inp)return;const txt=(inp.value||'').trim();if(!txt)return;inp.disabled=true;inp.value='';
  await sb.from('nachtrag_messages').insert({nachtrag_id:nid,role:'user',content:txt});
  const{error}=await sb.from('agent_runs').insert({project_id:current,agent:'nachtrag-chat',status:'queued',meta:{nachtrag_id:nid}});
  if(error&&error.code!=='23505')alert('Konnte nicht senden: '+error.message);
  renderNachtragChat(nid);}

{const gb=el('glossbtn');if(gb)gb.addEventListener('click',openGloss);}initTips();
function setDrawer(open){const s=document.querySelector('.sidebar'),b=el('sbbackdrop');if(s)s.classList.toggle('open',open);if(b)b.classList.toggle('open',open);}
function boot(){if(started){render();return;}started=true;render();loadRuns();
  const mb=el('menubtn'),bd=el('sbbackdrop');
  if(mb)mb.onclick=()=>setDrawer(!document.querySelector('.sidebar').classList.contains('open'));
  if(bd)bd.onclick=()=>setDrawer(false);
  setInterval(()=>loadRuns(),15000);  // Runner-Status + Läufe regelmäßig auffrischen
  sb.channel('os-rt').on('postgres_changes',{event:'*',schema:'public',table:'agent_runs'},()=>loadRuns())
   .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},()=>{if(view==='project')render();})
   .on('postgres_changes',{event:'*',schema:'public',table:'communications'},()=>render())
   .on('postgres_changes',{event:'*',schema:'public',table:'projects'},()=>{if(view==='project')render();})
   .subscribe(st=>{if(st==='SUBSCRIBED')el('runlive').textContent='● live';});}
function go(v,id){view=v;current=id||null;if(v==='project'){pview='dashboard';tab='alle';prioFilters.clear();openSecs=new Set(['vorausschau','aufgaben']);}setDrawer(false);render();}
async function render(){renderSidebar();if(view==='cockpit')await renderCockpit();else if(view==='project'&&pview==='system')await renderSystemPanel();else await renderProject();}
function timeAgo(d){if(!d)return '—';const s=(Date.now()-new Date(d).getTime())/1000;if(s<90)return 'gerade';if(s<5400)return 'vor '+Math.round(s/60)+' min';if(s<172800)return 'vor '+Math.round(s/3600)+' h';return 'vor '+Math.round(s/86400)+' d';}
async function queueAgentFor(projectId,agent,btn){if(btn){btn.disabled=true;btn.textContent='…';}const{error}=await sb.from('agent_runs').insert({project_id:projectId,agent,status:'queued',meta:{trigger:'manuell'}});const dup=error&&error.code==='23505';if(error&&!dup)alert('Konnte nicht starten: '+error.message);if(btn){btn.textContent=dup?'läuft bereits':'…';setTimeout(()=>{btn.disabled=false;btn.textContent='Aktualisieren';},1600);}loadRuns();}

async function renderCockpit(){el('crumb').textContent='Cockpit';
  const[{data:ps},{data:ts},{data:cs}]=await Promise.all([sb.from('projects').select('id,name,lph,dashboard').order('name'),sb.from('tasks').select('project_id,status,prio,title,due_date'),sb.from('communications').select('project_id,status,frist,betreff')]);
  const m={};(ps||[]).forEach(p=>m[p.id]={name:p.name,lph:p.lph,offen:0,p1:0,od:0});
  (ts||[]).forEach(t=>{const b=m[t.project_id];if(b&&t.status!=='erledigt'){b.offen++;if(t.prio==='P1')b.p1++;}});
  const td=today();(cs||[]).forEach(c=>{const b=m[c.project_id];if(b&&(c.status==='ueberfaellig'||(c.frist&&c.frist<td&&!['beantwortet','erledigt'].includes(c.status))))b.od++;});
  // ── Portfolio-Frühwarnung: das Kritischste über ALLE Projekte ──
  const warn=[];
  (ps||[]).forEach(p=>{const vs=(p.dashboard||{}).vorausschau||{};
    (vs.zwangspunkte||[]).forEach(z=>{if(z.status==='danger'||(z.puffer_wochen!=null&&z.puffer_wochen<=2))warn.push({pid:p.id,pn:short(p.name),typ:'Zwangspunkt',titel:z.name,frist:z.frist,lvl:'danger'});});
    (vs.diese_woche||[]).forEach(w=>{if(w.dringlichkeit==='jetzt')warn.push({pid:p.id,pn:short(p.name),typ:'Diese Woche',titel:w.titel,frist:w.frist,lvl:'warn'});});
    ((p.dashboard||{}).fachplaner||[]).forEach(fp=>{(fp.zulieferungen||[]).forEach(z=>{if(z&&z.was&&z.status!=='geliefert'&&(z.status==='ueberfaellig'||(z.frist&&z.frist<td)))warn.push({pid:p.id,pn:short(p.name),typ:'Zulieferung '+(fp.rolle||'Fachplaner'),titel:z.was,frist:z.frist,lvl:'danger'});});});});
  (ts||[]).forEach(t=>{if(t.status!=='erledigt'&&t.prio==='P1'&&t.due_date&&t.due_date<td&&m[t.project_id])warn.push({pid:t.project_id,pn:short(m[t.project_id].name),typ:'Aufgabe P1 überfällig',titel:t.title,frist:t.due_date,lvl:'danger'});});
  (cs||[]).forEach(c=>{if(c.status==='ueberfaellig'&&m[c.project_id])warn.push({pid:c.project_id,pn:short(m[c.project_id].name),typ:'Nachhaken überfällig',titel:c.betreff,frist:c.frist,lvl:'danger'});});
  warn.sort((a,b)=>(a.lvl==='danger'?0:1)-(b.lvl==='danger'?0:1)||((a.frist||'9999')<(b.frist||'9999')?-1:1));
  let h='<h1 class="page">Cockpit</h1><div class="page-sub">'+(ps||[]).length+' Projekte · klick für das Projekt-Dashboard</div>';
  if(warn.length)h+='<div class="fw"><div class="fw-h"><span class="fw-dot"></span>Frühwarnung · was als Nächstes kritisch wird <span class="fw-cnt">'+warn.length+'</span></div>'+warn.slice(0,8).map(w=>'<div class="fw-item '+w.lvl+'" data-id="'+w.pid+'"><span class="fw-proj">'+esc(w.pn)+'</span><span class="fw-typ">'+esc(w.typ)+'</span><span class="fw-titel">'+esc(w.titel||'')+'</span><span class="fw-frist mono">'+(w.frist?'Frist '+fmtFrist(w.frist):'—')+'</span></div>').join('')+'</div>';
  h+='<div class="grid">';
  for(const p of(ps||[])){const b=m[p.id];const nr=(p.name.match(/\d{3,4}/)||[''])[0];h+='<div class="pcard'+(b.od?' alert':'')+'" data-id="'+p.id+'">'+(nr?'<div class="pcard-nr">'+nr+'</div>':'')+'<div class="pn">'+esc(short(p.name))+'</div><div class="plph">'+(b.lph?'LPH '+b.lph+' aktiv':'Phase offen')+'</div><div class="pk"><div><div class="v">'+b.offen+'</div><div class="k">offen</div></div><div><div class="v'+(b.p1?' r':'')+'">'+b.p1+'</div><div class="k">P1</div></div><div><div class="v'+(b.od?' r':'')+'">'+b.od+'</div><div class="k">überfällig</div></div></div></div>';}
  el('main').innerHTML=h+'</div>';
  el('main').querySelectorAll('.pcard').forEach(c=>c.onclick=()=>go('project',c.dataset.id));
  el('main').querySelectorAll('.fw-item').forEach(c=>c.onclick=()=>go('project',c.dataset.id));}

function renderRaumGrafik(rp){const raeume=(rp.raeume||[]).filter(r=>r&&r.name&&(+r.flaeche_m2>0));if(!raeume.length)return '';
  // Funktionsdiagramm: jeder Raum = Rechteck, Flaeche masstaeblich zur EINZELRAUM-m2 (flaeche_m2 ist Gesamtflaeche der anzahl Raeume).
  const per=r=>(+r.flaeche_m2||0)/Math.max(1,+r.anzahl||1);
  // Skala robust: 85%-Perzentil als Bezug, damit grosse Sammel-/Verkehrsflaechen nicht alles plattdruecken
  const pers=raeume.map(per).sort((a,b)=>a-b);const cap=Math.max(pers[Math.min(pers.length-1,Math.floor(pers.length*0.85))]||1,1);
  const k=112/Math.sqrt(cap); // px je sqrt(m2)
  const cl={};raeume.forEach(r=>{const c=r.cluster||'Sonstige';(cl[c]=cl[c]||[]).push(r);});
  const pal=['#5FA8B5','#5FA86F','#9B6FA0','#B57C7C','#E3E36F','#8A9C7C','#E08A8A','#E0B85F','#6FA89B','#B5C9C2'];let ci=0;
  let h='<div class="rg2">';
  for(const c in cl){const col=pal[ci%pal.length];ci++;
    const sum=cl[c].reduce((s,r)=>s+(+r.flaeche_m2||0),0);
    const names=[...new Set(cl[c].map(r=>r.name))];
    h+='<div class="rg2-cl"><div class="rg2-cl-h">'+esc(c)+' <span class="rg2-cl-sum">'+Math.round(sum)+' m²</span></div><div class="rg2-boxes">';
    cl[c].forEach(r=>{const n=Math.max(1,Math.min(+r.anzahl||1,40));const pa=per(r);const side=Math.max(22,Math.min(128,Math.round(Math.sqrt(Math.min(pa,cap*1.25))*k)));
      const br=(0.80+(names.indexOf(r.name)%5)*0.09).toFixed(2);
      for(let i=0;i<n;i++)h+='<div class="rg2-box" style="width:'+side+'px;height:'+side+'px;background:'+col+';filter:brightness('+br+')" title="'+esc(r.name)+' · ~'+Math.round(pa)+' m²/Raum'+(n>1?' (Raum '+(i+1)+'/'+n+', '+Math.round(+r.flaeche_m2)+' m² gesamt)':'')+'"></div>';});
    h+='</div></div>';}
  return h+'</div>'+(rp.summe_nf_m2?'<div class="rg-total">Summe Nutzfläche: <strong>'+Math.round(rp.summe_nf_m2).toLocaleString('de-DE')+' m²</strong> · Blöcke flächen­maßstäblich (Einzelraum), Hover zeigt Details</div>':'<div class="rg-total" style="border:none">Blöcke flächenmaßstäblich · Hover zeigt Details</div>');
}

  const list=mg.slice().sort((a,b)=>((order[a.status]==null?9:order[a.status])-(order[b.status]==null?9:order[b.status]))||((a.frist||'9999')<(b.frist||'9999')?-1:1));
  return '<div class="inner"><div class="mg-list">'+list.map(m=>{const st=m.status||'offen';const ov=st!=='behoben'&&st!=='abgenommen'&&m.frist&&m.frist<td;const cls=(st==='behoben'||st==='abgenommen')?'ok':st==='in-behebung'?'warn':'bad';
    return '<div class="mg-row '+cls+(ov?' overdue':'')+'"><div class="mg-main"><div class="mg-desc">'+esc(m.beschreibung||'')+'</div><div class="mg-meta">'+(m.gewerk?'<span class="task-chip">'+esc(m.gewerk)+'</span>':'')+(m.verantwortlich?'<span>'+esc(m.verantwortlich)+'</span>':'')+(m.frist?'<span class="mono'+(ov?' over':'')+'">Frist '+esc(fmtFrist(m.frist))+'</span>':'')+'</div></div><span class="mg-status '+cls+'">'+esc(st)+'</span></div>';}).join('')+'</div></div>';}
function renderEntscheidungen(eo){const td=today();return eo.map(e=>{const ov=e.bis&&e.bis<td;return '<div class="vrow'+(ov?' overdue':'')+'"><div style="flex:1"><div class="vtitle">'+esc(e.thema||'')+'</div>'+(e.kontext?'<div class="ent-ctx">'+esc(e.kontext)+'</div>':'')+'<div class="vmeta">'+(e.wer?'<span class="task-chip">'+esc(e.wer)+'</span>':'')+(e.bis?'<span class="mono'+(ov?'':'')+'">bis '+esc(fmtFrist(e.bis))+'</span>':'<span class="mono" style="color:var(--c-slate-400)">Termin offen</span>')+'</div></div></div>';}).join('');}
function renderAktivitaet(recent){if(!recent.length)return '<div class="empty">Keine datierten Dateien.</div>';return recent.map(d=>'<div class="act-row"><span class="af">'+esc(d.filename)+'</span><span class="ad">'+esc(d.doctype||'')+' · '+fmtD(d.modified_at)+'</span></div>').join('');}
function beteiligte(C){const m={};C.forEach(c=>{const k=(c.empfaenger_email||c.empfaenger||'').toLowerCase();if(!k)return;if(!m[k])m[k]={name:c.empfaenger||c.empfaenger_email,mail:c.empfaenger_email||'',n:0};m[k].n++;});return Object.values(m).sort((a,b)=>b.n-a.n);}
function renderFolders(F,total){if(!F.length)return '<div class="empty">Keine Ordner.</div>';const max=Math.max(...F.map(f=>+f.anzahl));return F.map(f=>'<div class="fld-row"><div><div>'+esc(f.ordner||'(Wurzel)')+'</div><div class="fld-bar"><i style="width:'+Math.round(+f.anzahl/max*100)+'%"></i></div></div><div class="fc2">'+f.anzahl+'</div></div>').join('');}
function renderComms(C){if(!C.length)return '<div class="inner"><div class="empty">Keine Vorgänge erfasst.</div></div>';const td=today();const list=C.slice().sort((a,b)=>(a.frist||'9999')<(b.frist||'9999')?-1:1);let h='<div class="inner">';
  for(const c of list){const m=c.meta||{};const od=(c.status==='ueberfaellig')||(c.frist&&c.frist<td&&!['beantwortet','erledigt'].includes(c.status));const st=c.status==='beantwortet'?'<span class="stat ok">beantwortet</span>':od?'<span class="stat alert">überfällig</span>':'<span class="stat warn">'+esc(stL(c.status))+'</span>';
    h+='<div class="vrow'+(od?' overdue':'')+'"><div style="flex:1"><div class="vtitle">'+esc(c.betreff)+'</div><div class="vmeta"><span class="task-chip">'+esc(c.typ)+'</span>'+st+(c.empfaenger?'<span>→ '+esc(c.empfaenger)+'</span>':'')+(m.tage_offen!=null?'<span class="mono">'+m.tage_offen+' T offen</span>':'')+(c.frist?'<span class="mono">Frist '+esc(fmtFrist(c.frist))+'</span>':'')+(m.quelle?'<span>Quelle: '+esc(m.quelle)+'</span>':'')+'</div></div></div>';}
  return h+'</div>';}
function wire(T,C){
  const tc=el('toC');if(tc)tc.onclick=()=>go('cockpit');
  el('main').querySelectorAll('[data-jfcopy]').forEach(b=>b.onclick=()=>copyToClip(jfBriefingText(),b));
  el('main').querySelectorAll('[data-fragcopy]').forEach(b=>b.onclick=()=>copyToClip(lph1FragenText(),b));
  el('main').querySelectorAll('.cl-cb').forEach(cb=>cb.onchange=()=>toggleChecklist(cb.dataset.clkey,cb.checked));
  el('main').querySelectorAll('.cl-ph').forEach(d=>d.addEventListener('toggle',()=>{const l=+d.dataset.cllph;d.open?openCl.add(l):openCl.delete(l);}));
  el('main').querySelectorAll('.sec-head').forEach(hd=>hd.onclick=()=>{const s=hd.closest('.sec'),id=s.dataset.sec;s.classList.toggle('open');s.classList.contains('open')?openSecs.add(id):openSecs.delete(id);});
  el('main').querySelectorAll('.pilgrim-station').forEach(st=>st.onclick=async()=>{await sb.from('projects').update({lph:+st.dataset.lph}).eq('id',current);render();});
  el('main').querySelectorAll('.task-row').forEach(r=>r.onclick=e=>{if(e.target.classList.contains('tcheck'))return;selTask=r.dataset.trow;el('main').querySelectorAll('.task-row').forEach(x=>x.classList.toggle('sel',x.dataset.trow===selTask));const d=el('aufgdetail');if(d){d.innerHTML=renderTaskDetail(taskMap[selTask]);wireDetail();}});
  el('main').querySelectorAll('.tcheck').forEach(cb=>cb.onchange=()=>toggleTask(cb.dataset.task,cb));
  wireDetail();
  el('main').querySelectorAll('button[data-agent]').forEach(b=>b.onclick=()=>queueAgent(b.dataset.agent,{},b));
  el('main').querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;applyTaskFilter();el('main').querySelectorAll('.tab-btn').forEach(x=>x.classList.toggle('active',x===b));});
  el('main').querySelectorAll('.fc').forEach(f=>f.onclick=()=>{const p=f.dataset.p;prioFilters.has(p)?prioFilters.delete(p):prioFilters.add(p);f.classList.toggle('active');applyTaskFilter();});
  const dq=el('docq'),dg=el('docgo');if(dg)dg.onclick=docSearch;if(dq)dq.onkeydown=e=>{if(e.key==='Enter')docSearch();};
  const atb=el('addtaskbtn'),atf=el('addtaskform');
  if(atb&&atf)atb.onclick=()=>{atf.hidden=!atf.hidden;if(!atf.hidden)el('nt-title').focus();};
  if(atf)atf.onsubmit=e=>{e.preventDefault();createTask();};
  el('main').querySelectorAll('button[data-deltask]').forEach(b=>b.onclick=async e=>{e.stopPropagation();if(confirm('Aufgabe löschen?')){const{error}=await sb.from('tasks').delete().eq('id',b.dataset.deltask);if(error)alert('Fehler: '+error.message);}});
  applyTaskFilter();
}
function applyTaskFilter(){el('main').querySelectorAll('.task-row').forEach(c=>{let show=true;if(tab!=='alle'&&c.dataset.category!==tab)show=false;if(prioFilters.size&&!prioFilters.has('P'+c.dataset.priority))show=false;c.classList.toggle('hide',!show);});}
let _sres=[],_sfilter='';
async function docSearch(){const q=el('docq').value.trim();const box=el('sres');if(!q){box.innerHTML='';_sres=[];return;}box.innerHTML='<div class="empty">Suche…</div>';
  const{data,error}=await sb.rpc('search_documents',{pid:current,q});
  if(error){box.innerHTML='<div class="empty">'+esc(error.message)+'</div>';return;}
  _sres=data||[];_sfilter='';renderSearchResults();}
function renderSearchResults(){const box=el('sres');if(!box)return;const all=_sres;
  if(!all.length){box.innerHTML='<div class="empty">Nichts gefunden.</div>';return;}
  const types={};all.forEach(d=>{const t=d.doctype||'?';types[t]=(types[t]||0)+1;});
  const list=_sfilter?all.filter(d=>(d.doctype||'?')===_sfilter):all;
  let h='<div class="sres-bar"><span class="sres-cnt">'+all.length+' Treffer · nach Relevanz</span>'+Object.keys(types).sort((a,b)=>types[b]-types[a]).map(t=>'<button class="sres-chip'+(_sfilter===t?' on':'')+'" data-stype="'+esc(t)+'">'+esc(t)+' '+types[t]+'</button>').join('')+(_sfilter?'<button class="sres-chip clr" data-stype="">alle</button>':'')+'</div>';
  h+=list.map(d=>{const parts=(d.unc_path||'').split(/[\\/]/);const folder=parts.length>1?parts[parts.length-2]:'';
    const snip=d.snippet?('<div class="sres-snip">'+esc(d.snippet).split('⟦H⟧').join('<mark>').split('⟦/H⟧').join('</mark>')+'</div>'):'<div class="sres-snip nomatch">Treffer im Dateinamen</div>';
    return '<div class="sres-item"><div class="sres-head"><span class="sres-fn">'+esc(d.filename)+'</span><span class="sres-dt">'+esc(d.doctype||'')+'</span></div>'+snip+'<div class="sres-foot">'+(folder?'<span class="sres-folder">📁 '+esc(folder)+'</span>':'')+(d.modified_at?'<span class="mono">'+fmtD(d.modified_at)+'</span>':'')+'<span style="flex:1"></span><button class="sres-copy" data-copypath="'+esc(d.unc_path||'').replace(/"/g,'&quot;')+'">Pfad kopieren</button></div></div>';}).join('');
  box.innerHTML=h;
  box.querySelectorAll('[data-stype]').forEach(b=>b.onclick=()=>{_sfilter=b.dataset.stype;renderSearchResults();});
  box.querySelectorAll('[data-copypath]').forEach(b=>b.onclick=()=>copyToClip(b.dataset.copypath,b));}
async function mailsFor(q){
  q=(q||'').trim(); if(!q)return;
  let ov=el('mailov'); if(!ov){ov=document.createElement('div');ov.id='mailov';document.body.appendChild(ov);}
  ov.setAttribute('style','position:fixed;inset:0;background:rgba(20,18,15,.45);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px');
  ov.innerHTML='<div style="background:#FBFAF7;border:1px solid #E4DFD5;border-radius:14px;max-width:640px;width:100%;max-height:80vh;overflow:auto;padding:16px 18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><b>Zugehörige E-Mails &amp; Dokumente · „'+esc(q)+'"</b><button onclick="el(\'mailov\').remove()" style="border:none;background:transparent;font-size:18px;cursor:pointer;color:#73706a">✕</button></div><div id="mailovb"><div class="empty">Suche…</div></div></div>';
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
  const r=await sb.rpc('search_documents',{pid:current,q:q});
  const body=el('mailovb'); if(!body)return;
  if(r.error){body.innerHTML='<div class="empty">'+esc(r.error.message)+'</div>';return;}
  const rows=(r.data||[]).slice().sort(function(a,b){return ((a.doctype==='email')?0:1)-((b.doctype==='email')?0:1);});
  if(!rows.length){body.innerHTML='<div class="empty">Nichts gefunden zu „'+esc(q)+'".</div>';return;}
  body.innerHTML=rows.slice(0,25).map(function(d){var snip=d.snippet?('<div class="sres-snip">'+esc(d.snippet).split('⟦H⟧').join('<mark>').split('⟦/H⟧').join('</mark>')+'</div>'):'';return '<div class="sres-item"><div class="sres-head"><span class="sres-fn">'+(d.doctype==='email'?'📧 ':'📄 ')+esc(d.filename)+'</span><span class="sres-dt">'+esc(d.doctype||'')+'</span></div>'+snip+'<div class="sres-foot"><span style="flex:1"></span><button class="sres-copy" data-copypath="'+esc(d.unc_path||'').split('"').join('&quot;')+'">Pfad kopieren</button></div></div>';}).join('');
  body.querySelectorAll('[data-copypath]').forEach(function(b){b.onclick=function(){copyToClip(b.dataset.copypath,b);};});
}
document.addEventListener('click',function(e){var b=e.target.closest&&e.target.closest('[data-mails]');if(b){e.preventDefault();mailsFor(b.dataset.mails);}});
async function toggleTask(id,cb){const ck=cb.checked;const{error}=await sb.from('tasks').update({status:ck?'erledigt':'offen',done_at:ck?new Date().toISOString():null}).eq('id',id);if(error){cb.checked=!ck;alert('Fehler: '+error.message);}}
async function queueAgent(agent,meta,btn){const lbl=btn?btn.textContent:'';if(btn){btn.disabled=true;btn.textContent='… eingereiht';}const{error}=await sb.from('agent_runs').insert({project_id:current,agent,status:'queued',meta});if(error){if(error.code==='23505'){if(btn)btn.textContent='läuft bereits';loadRuns();if(btn)setTimeout(()=>{btn.disabled=false;btn.textContent=lbl;},1600);return;}alert('Konnte Agent nicht starten: '+error.message);if(btn){btn.disabled=false;btn.textContent=lbl;}return;}loadRuns();if(btn)setTimeout(()=>{btn.disabled=false;btn.textContent=lbl;},1600);}
async function loadRuns(){const[{data,error},{data:hb}]=await Promise.all([
    sb.from('agent_runs').select('id,agent,status,result,log,started_at,project_id,projects(name)').order('created_at',{ascending:false}).limit(14),
    sb.from('runner_heartbeat').select('last_seen').eq('id',1)]);
  // Echter Runner-Status aus dem Heartbeat (nicht geraten)
  const hbAge=hb&&hb[0]?Date.now()-new Date(hb[0].last_seen).getTime():9e12;
  const runnerOn=hbAge<20000;
  const rs=el('rstatus');if(rs){rs.className='rstatus '+(runnerOn?'on':'off');el('rstext').textContent=runnerOn?'Runner aktiv':'Runner offline';}
  // Banner: läuft gerade ein Agent? ODER Runner offline + Aufträge warten?
  const bn=el('runbanner');
  if(bn){const live=(view==='project'&&current)?(data||[]).find(r=>r.project_id===current&&(r.status==='running'||r.status==='queued')):null;
    const waiting=(data||[]).filter(r=>r.status==='queued').length;
    if(live&&runnerOn){bn.hidden=false;bn.className='runbanner';bn.innerHTML='<span class="pulse"></span>Agent läuft: <strong>'+esc(AL[live.agent]||live.agent)+'</strong> · '+(live.status==='queued'?'in Warteschlange…':'arbeitet…')+' <span class="mono">live · Fortschritt links in der Agenten-Leiste</span>';}
    else if(!runnerOn&&waiting){bn.hidden=false;bn.className='runbanner off';bn.innerHTML='<span style="font-size:14px">⚠</span> <strong>Runner offline</strong> — '+waiting+' Auftrag/Aufträge warten und laufen automatisch, sobald der Büro-PC aktiv ist. <span class="mono">Daten im Dashboard bleiben sichtbar.</span>';}
    else bn.hidden=true;}
  if(error){el('runs').innerHTML='<div class="empty">'+esc(error.message)+'</div>';return;}
  if(!data.length){el('runs').innerHTML='<div class="empty">Noch keine Agenten-Läufe.</div>';return;}
  let h='';for(const r of data){const pn=r.projects?short(r.projects.name):'';h+='<div class="run" data-run="'+r.id+'"><div class="rh">'+(r.status==='running'?'<span class="pulse"></span>':'')+'<span class="ra">'+esc(AL[r.agent]||r.agent)+'</span><span class="rst '+r.status+'">'+r.status+'</span></div><div class="rp">'+esc(pn)+(r.result?' · '+esc(r.result):'')+'</div>'+(openRun===r.id&&r.log?'<pre>'+esc(r.log)+'</pre>':'')+'</div>';}
  el('runs').innerHTML=h;el('runs').querySelectorAll('.run').forEach(d=>d.onclick=()=>{openRun=openRun===d.dataset.run?null:d.dataset.run;loadRuns();});}
</script>
