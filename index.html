<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agentic OS · Gutthann HIW</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--c-navy-900:#16181D;--c-navy-800:#16181D;--c-navy-700:#565A62;--c-blue-700:#9E3D20;--c-blue-600:#BE4D2C;--c-blue-500:#BE4D2C;--c-blue-400:#D49A86;--c-blue-200:#9094A8;--c-blue-100:#F3E2DB;--c-blue-50:#F3E2DB;--c-slate-900:#16181D;--c-slate-800:#16181D;--c-slate-700:#565A62;--c-slate-600:#565A62;--c-slate-500:#9094A8;--c-slate-400:#9094A8;--c-slate-300:#D6D2C7;--c-slate-200:#E7E4DC;--c-slate-100:#F4F2EC;--c-slate-50:#FAF9F6;--c-white:#FFF;--c-success:#3E7A53;--c-success-bg:#E0EBE2;--c-warning:#BC8420;--c-warning-bg:#F2E9D4;--c-danger:#B23B3B;--c-danger-bg:#F2DEDD;--c-amber:#C6A24E;--c-amber-bg:#FBF3DD;--r-sm:2px;--r-md:4px;--r-lg:6px;--s2:8px;--s3:12px;--s4:16px;--s5:20px;--s6:24px;--s8:32px;--f-sans:'Archivo',system-ui,sans-serif;--f-mono:'IBM Plex Mono',ui-monospace,monospace;--sh:0 1px 2px rgba(22,24,29,.04),0 1px 3px rgba(22,24,29,.05)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f-sans);font-size:13px;line-height:1.5;color:var(--c-slate-800);background:#F1EFEA;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}.mono{font-family:var(--f-mono)}
.top{background:var(--c-white);border-bottom:1px solid var(--c-slate-200);padding:11px 22px;display:flex;align-items:center;gap:13px;position:sticky;top:0;z-index:20}
.top .brand{font-family:var(--f-mono);font-size:11px;letter-spacing:1.3px;text-transform:uppercase;color:var(--c-blue-600);font-weight:600}
.top .crumb{font-size:14px;font-weight:600}.top .crumb a{color:var(--c-slate-500);cursor:pointer}.top .crumb a:hover{color:var(--c-blue-600)}
.top .sep{color:var(--c-slate-400);margin:0 7px}.top .right{margin-left:auto;display:flex;align-items:center;gap:12px}
.top .user{font-family:var(--f-mono);font-size:11px;color:var(--c-slate-600)}
.rstatus{font-family:var(--f-mono);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:3px 9px;border-radius:11px;display:flex;align-items:center;gap:6px}

.layout{display:flex;align-items:flex-start}
.main{flex:1;min-width:0;padding:22px 24px 60px;max-width:1180px;margin:0 auto}
.sidebar{width:300px;flex:0 0 300px;border-right:1px solid var(--c-slate-200);background:var(--c-slate-50);min-height:calc(100vh - 47px);padding:18px 15px;position:sticky;top:47px;overflow-y:auto;max-height:calc(100vh - 47px)}
.sb-proj-label{font-family:var(--f-mono);font-size:9.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--c-slate-500);margin:0 2px 14px;font-weight:600;line-height:1.3}

.hdr{background:var(--c-white);border:1px solid var(--c-slate-200);border-radius:var(--r-lg);padding:18px 24px;margin-bottom:var(--s4);display:grid;grid-template-columns:1fr auto;gap:var(--s5);align-items:end;box-shadow:var(--sh)}
.hdr-brand{font-family:var(--f-mono);font-size:11px;color:var(--c-blue-600);letter-spacing:1.1px;text-transform:uppercase;font-weight:600}
.hdr-title{font-size:26px;font-weight:700;letter-spacing:-.4px;line-height:1.15;margin-top:7px;color:var(--c-navy-900)}
.hdr-meta{font-size:12px;color:var(--c-slate-600);margin-top:11px;display:flex;gap:var(--s5);flex-wrap:wrap}.hdr-meta strong{color:var(--c-navy-900);font-weight:600}
.hdr-status{text-align:right;font-size:10.5px;color:var(--c-slate-500);text-transform:uppercase;letter-spacing:.5px;font-family:var(--f-mono)}
.hdr-status .stamp{display:block;font-size:12px;color:var(--c-navy-900);margin-top:3px;text-transform:none;letter-spacing:0}
.pilgrim{background:var(--c-white);border:1px solid var(--c-slate-200);border-radius:var(--r-lg);padding:16px 22px;margin-bottom:var(--s4);box-shadow:var(--sh)}
.pilgrim-label{font-family:var(--f-mono);font-size:10px;color:var(--c-slate-500);letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-bottom:14px}

.pilgrim-line-progress{position:absolute;top:15px;left:5.5%;height:2px;background:var(--c-blue-500)}
.pilgrim-station{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;padding:2px;border-radius:var(--r-sm)}

.pilgrim-dot{width:30px;height:30px;border-radius:50%;background:var(--c-white);border:2px solid var(--c-slate-300);display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:12px;font-weight:600;color:var(--c-slate-500)}

.pilgrim-labelset{font-size:10px;text-align:center;color:var(--c-slate-500);font-weight:500;line-height:1.25}
.pilgrim-station.done .pilgrim-labelset{color:var(--c-navy-700)}.pilgrim-station.active .pilgrim-labelset{color:var(--c-navy-900);font-weight:700}
.kpi-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:var(--s3);margin-bottom:var(--s4)}
.kpi{background:var(--c-white);border:1px solid var(--c-slate-200);border-radius:var(--r-lg);padding:14px 15px;box-shadow:var(--sh)}
.kpi-label{font-family:var(--f-mono);font-size:10px;color:var(--c-slate-500);letter-spacing:.6px;text-transform:uppercase;font-weight:600;margin-bottom:8px}
.kpi-value{font-family:var(--f-mono);font-size:24px;font-weight:600;color:var(--c-navy-900);line-height:1;letter-spacing:-.5px}
.kpi-unit{font-size:12px;color:var(--c-slate-500);margin-left:3px}
.kpi-sub{font-size:10.5px;color:var(--c-slate-500);margin-top:8px}
.kpi.accent{background:linear-gradient(180deg,var(--c-blue-50),var(--c-white));border-color:#E8C9BD}.kpi.accent .kpi-value{color:var(--c-blue-700)}
.kpi.alert{background:var(--c-danger-bg);border-color:#E3B7B6}.kpi.alert .kpi-value{color:var(--c-danger)}
.kpi.warn{background:var(--c-amber-bg);border-color:#E6D29A}.kpi.warn .kpi-value{color:var(--c-warning)}
@media(max-width:1100px){.kpi-strip{grid-template-columns:repeat(3,1fr)}}
.sec{background:var(--c-white);border:1px solid var(--c-slate-200);border-radius:var(--r-lg);margin-bottom:var(--s3);overflow:hidden;box-shadow:var(--sh)}
.sec.prominent{border-color:var(--c-slate-300)}
.sec-head{width:100%;background:none;border:none;padding:13px 18px;display:grid;grid-template-columns:30px 1fr auto 18px;gap:var(--s3);align-items:center;text-align:left}
.sec-head:hover{background:var(--c-slate-50)}.sec.prominent .sec-head{background:#F4F2EC}
.sec-icon{width:26px;height:26px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--c-blue-100);color:var(--c-blue-700)}
.sec.prominent .sec-icon{background:var(--c-blue-600);color:#fff}
.sec-title{font-size:14px;font-weight:700;color:var(--c-navy-900)}.sec-summary{font-size:11px;color:var(--c-slate-500);margin-top:2px}
.sec-meta{display:flex;gap:var(--s2);align-items:center}
.stat{font-family:var(--f-mono);font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px;background:var(--c-slate-100);color:var(--c-slate-700)}
.stat.alert{background:var(--c-danger-bg);color:var(--c-danger)}.stat.warn{background:var(--c-amber-bg);color:var(--c-warning)}.stat.ok{background:var(--c-success-bg);color:var(--c-success)}
.sec-chevron{width:16px;height:16px;stroke:var(--c-slate-400);stroke-width:2.2;fill:none;transition:transform .2s}.sec.open .sec-chevron{transform:rotate(180deg)}
.sec-body{display:none;border-top:1px solid var(--c-slate-200)}.sec.open .sec-body{display:block}
.inner{padding:var(--s4) var(--s5)}

.tab-btn{background:none;border:none;padding:11px 13px;font-size:12px;color:var(--c-slate-600);font-weight:600;white-space:nowrap;border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px}

.tasks-filters{padding:9px var(--s5);border-bottom:1px solid var(--c-slate-200);display:flex;gap:var(--s3);align-items:center;flex-wrap:wrap}
.filter-label{font-family:var(--f-mono);font-size:9.5px;color:var(--c-slate-500);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.fc{background:var(--c-slate-100);border:1px solid var(--c-slate-200);color:var(--c-slate-700);padding:3px 9px;border-radius:11px;font-size:10.5px;font-weight:600;cursor:pointer}
.fc.active{background:var(--c-navy-900);border-color:var(--c-navy-900);color:#fff}.fc.s1.active{background:var(--c-danger);border-color:var(--c-danger)}.fc.s2.active{background:var(--c-amber);border-color:var(--c-amber)}
.task-card{border-bottom:1px solid var(--c-slate-200)}.task-card:last-child{border-bottom:none}.task-card.hide{display:none}.task-card.expanded{border-left:3px solid var(--c-blue-600)}
.task-head{width:100%;padding:11px var(--s5);display:grid;grid-template-columns:20px 1fr auto 16px;gap:var(--s3);align-items:center;cursor:pointer}.task-head:hover{background:var(--c-slate-50)}

.task-prio{width:20px;height:18px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:10px;font-weight:600;color:#fff}
.task-prio.p1{background:var(--c-danger)}.task-prio.p2{background:var(--c-amber)}.task-prio.p3{background:var(--c-navy-700)}
.task-chevron{width:15px;height:15px;stroke:var(--c-slate-400);stroke-width:2;fill:none;transition:transform .2s}.task-card.expanded .task-chevron{transform:rotate(180deg)}
.task-body{display:none;padding:0 var(--s5) var(--s4) 46px}.task-card.expanded .task-body{display:block}
.task-section h4{font-family:var(--f-mono);font-size:9.5px;color:var(--c-slate-500);text-transform:uppercase;letter-spacing:.7px;font-weight:600;margin:var(--s3) 0 6px}
.task-context-box{background:var(--c-blue-50);border:1px solid var(--c-blue-200);border-radius:var(--r-md);padding:var(--s3);font-size:12px;color:var(--c-navy-800);white-space:pre-wrap;line-height:1.55;max-height:230px;overflow:auto}
.task-resp{font-size:10.5px;color:var(--c-slate-500);margin-top:var(--s3)}.task-resp strong{color:var(--c-navy-900)}
.btn-sm{margin-top:var(--s3);padding:6px 12px;background:var(--c-blue-600);color:#fff;border:none;border-radius:var(--r-md);font-size:11px;font-weight:600}.btn-sm:hover{background:var(--c-blue-700)}
.btn-sm.ghost{background:var(--c-white);border:1px solid var(--c-slate-300);color:var(--c-slate-700)}
/* analytic sections */
.lrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--c-slate-100);font-size:12px}.lrow:last-child{border:none}
.lrow .ls{font-family:var(--f-mono);font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.ls.vollstaendig{background:var(--c-success-bg);color:var(--c-success)}.ls.teilweise{background:var(--c-warning-bg);color:var(--c-warning)}.ls.fehlend{background:var(--c-danger-bg);color:var(--c-danger)}
.kg-table{width:100%;border-collapse:collapse;font-size:12px}.kg-table td,.kg-table th{padding:6px 8px;border-bottom:1px solid var(--c-slate-100);text-align:left}.kg-table td.n{font-family:var(--f-mono);text-align:right}.kg-table th{font-family:var(--f-mono);font-size:9.5px;text-transform:uppercase;color:var(--c-slate-500);letter-spacing:.5px}
.cta{background:var(--c-slate-50);border:1px dashed var(--c-slate-300);border-radius:var(--r-md);padding:var(--s4);text-align:center}
.cta p{font-size:12px;color:var(--c-slate-600);margin-bottom:var(--s3);line-height:1.5}
.act-row{display:grid;grid-template-columns:1fr auto;gap:var(--s3);padding:7px 0;border-bottom:1px solid var(--c-slate-100);font-size:12px;align-items:center}.act-row:last-child{border:none}
.act-row .af{color:var(--c-navy-900);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.act-row .ad{font-family:var(--f-mono);font-size:10.5px;color:var(--c-slate-500)}
.ppl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:var(--s2)}
.ppl-card{background:var(--c-slate-50);border-left:3px solid var(--c-navy-800);border-radius:var(--r-sm);padding:8px 12px}
.ppl-name{font-size:12px;font-weight:600;color:var(--c-navy-900)}.ppl-mail{font-family:var(--f-mono);font-size:10px;color:var(--c-slate-600);margin-top:2px}.ppl-cnt{font-size:10px;color:var(--c-slate-500);margin-top:2px}
.fld-row{display:grid;grid-template-columns:1fr 46px;gap:var(--s3);align-items:center;padding:5px 0;font-size:12px}
.fld-bar{height:7px;background:var(--c-slate-100);border-radius:4px;overflow:hidden;margin-top:3px}.fld-bar i{display:block;height:100%;background:var(--c-blue-400)}
.fld-row .fc2{font-family:var(--f-mono);font-size:11px;color:var(--c-slate-600);text-align:right}
.search-box{display:flex;gap:var(--s2);margin-bottom:var(--s3)}

.search-box input:focus{outline:none;border-color:var(--c-blue-600);background:#fff}
.search-box button{padding:0 16px;background:var(--c-blue-600);color:#fff;border:none;border-radius:var(--r-md);font-weight:600;font-size:12px}
.sres{padding:7px 0;border-bottom:1px solid var(--c-slate-100);font-size:12px}.sres:last-child{border:none}.sres .sf{font-weight:600;color:var(--c-navy-900)}.sres .sp{font-family:var(--f-mono);font-size:10px;color:var(--c-slate-500);margin-top:2px;word-break:break-all}
.vrow{display:flex;gap:var(--s3);align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--c-slate-100)}.vrow:last-child{border:none}
.vrow.overdue{padding-left:10px;border-left:3px solid var(--c-danger);margin-left:-10px;background:var(--c-danger-bg)}
.vtitle{font-size:12.5px;font-weight:600;color:var(--c-navy-900)}.vmeta{display:flex;gap:var(--s2);flex-wrap:wrap;align-items:center;font-size:10.5px;color:var(--c-slate-500);margin-top:4px}
.palette{display:flex;gap:9px;flex-wrap:wrap}.acard{background:var(--c-slate-50);border:1px solid var(--c-slate-200);border-radius:var(--r-md);padding:12px 14px;width:172px}
.acard .an{font-size:12.5px;font-weight:600;color:var(--c-navy-900)}.acard .ad{font-size:10.5px;color:var(--c-slate-500);line-height:1.4;margin:4px 0 10px;min-height:28px}
h1.page{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:3px;color:var(--c-navy-900)}.page-sub{color:var(--c-slate-600);font-size:12px;margin-bottom:18px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:13px}
.pcard{background:var(--c-white);border:1px solid var(--c-slate-200);border-left:3px solid var(--c-slate-300);border-radius:var(--r-lg);box-shadow:var(--sh);padding:16px 17px;cursor:pointer}
.pcard:hover{border-left-color:var(--c-blue-600)}.pcard.alert{border-left-color:var(--c-danger)}
.pcard .pn{font-size:14.5px;font-weight:600;line-height:1.3;color:var(--c-navy-900)}.pcard .plph{font-family:var(--f-mono);font-size:10px;color:var(--c-blue-700);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.pcard .pk{display:flex;gap:18px;margin-top:13px}.pk .v{font-family:var(--f-mono);font-size:20px;font-weight:600;color:var(--c-navy-900);line-height:1}.pk .v.r{color:var(--c-danger)}
.pk .k{font-family:var(--f-mono);font-size:9px;color:var(--c-slate-500);text-transform:uppercase;letter-spacing:.4px;margin-top:4px}
.side-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.side-h .t{font-size:13px;font-weight:600}
.run{background:var(--c-white);border:1px solid var(--c-slate-200);border-radius:var(--r-md);padding:9px 11px;margin-bottom:7px;cursor:pointer}
.run .rh{display:flex;align-items:center;gap:7px}.run .ra{font-size:12px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rst{font-family:var(--f-mono);font-size:9px;letter-spacing:.3px;text-transform:uppercase;padding:2px 6px;border-radius:9px;font-weight:600}
.rst.queued{background:var(--c-slate-100);color:var(--c-slate-600)}.rst.running{background:var(--c-amber-bg);color:var(--c-warning)}.rst.done{background:var(--c-success-bg);color:var(--c-success)}.rst.failed{background:var(--c-danger-bg);color:var(--c-danger)}
.run .rp{font-size:10px;color:var(--c-slate-500);margin-top:4px}

.pulse{width:7px;height:7px;border-radius:50%;background:var(--c-warning);animation:p 1.3s infinite}@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}

function kpi(cl,label,val,unit,sub){return '<div class="kpi '+cl+'"><div class="kpi-label">'+label+'</div><div class="kpi-value">'+val+(unit?'<span class="kpi-unit">'+unit+'</span>':'')+'</div><div class="kpi-sub">'+sub+'</div></div>';}

function renderComms(C){if(!C.length)return '<div class="inner"><div class="empty">Keine Vorgänge erfasst.</div></div>';const td=today();const list=C.slice().sort((a,b)=>(a.frist||'9999')<(b.frist||'9999')?-1:1);let h='<div class="inner">';
  for(const c of list){const od=c.frist&&c.frist<td&&!['beantwortet','erledigt'].includes(c.status);const st=c.status==='beantwortet'?'<span class="stat ok">beantwortet</span>':od?'<span class="stat alert">überfällig</span>':'<span class="stat warn">'+esc(c.status)+'</span>';
    h+='<div class="vrow'+(od?' overdue':'')+'"><div style="flex:1"><div class="vtitle">'+esc(c.betreff)+'</div><div class="vmeta"><span class="task-chip">'+esc(c.typ)+'</span>'+st+(c.empfaenger?'<span>→ '+esc(c.empfaenger)+'</span>':'')+(c.frist?'<span class="mono">Frist '+c.frist+'</span>':'')+'</div></div></div>';}
  return h+'</div>';}
function wire(T,C){
  const tc=el('toC');if(tc)tc.onclick=()=>go('cockpit');
  el('main').querySelectorAll('.sec-head').forEach(hd=>hd.onclick=()=>{const s=hd.closest('.sec'),id=s.dataset.sec;s.classList.toggle('open');s.classList.contains('open')?openSecs.add(id):openSecs.delete(id);});
  el('main').querySelectorAll('.pilgrim-station').forEach(st=>st.onclick=async()=>{await sb.from('projects').update({lph:+st.dataset.lph}).eq('id',current);render();});
  el('main').querySelectorAll('.task-head').forEach(hd=>hd.onclick=e=>{if(e.target.classList.contains('tcheck'))return;hd.closest('.task-card').classList.toggle('expanded');});
  el('main').querySelectorAll('.tcheck').forEach(cb=>cb.onchange=()=>{ if(cb.dataset.key){ toggleDone(cb.dataset.key,cb.checked); cb.closest('.task-card').classList.toggle('done',cb.checked); } else { toggleTask(cb.dataset.task,cb); } });
  el('main').querySelectorAll('button[data-mail]').forEach(b=>b.onclick=e=>{e.stopPropagation();queueAgent('email-draft',{task_id:b.dataset.mail},b);});
  el('main').querySelectorAll('button[data-agent]').forEach(b=>b.onclick=()=>queueAgent(b.dataset.agent,{},b));
  el('main').querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;applyTaskFilter();el('main').querySelectorAll('.tab-btn').forEach(x=>x.classList.toggle('active',x===b));});
  el('main').querySelectorAll('.fc').forEach(f=>f.onclick=()=>{const p=f.dataset.p;prioFilters.has(p)?prioFilters.delete(p):prioFilters.add(p);f.classList.toggle('active');applyTaskFilter();});
  const dq=el('docq'),dg=el('docgo');if(dg)dg.onclick=docSearch;if(dq)dq.onkeydown=e=>{if(e.key==='Enter')docSearch();};
  applyTaskFilter();
}
function applyTaskFilter(){el('main').querySelectorAll('.task-card').forEach(c=>{let show=true;if(tab!=='alle'&&c.dataset.category!==tab)show=false;if(prioFilters.size&&!prioFilters.has('P'+c.dataset.priority))show=false;c.classList.toggle('hide',!show);});}
async function docSearch(){const q=el('docq').value.trim();const box=el('sres');if(!q){box.innerHTML='';return;}box.innerHTML='<div class="empty">Suche…</div>';
  const{data,error}=await sb.from('documents').select('filename,unc_path,doctype').eq('project_id',current).textSearch('fts',q,{type:'websearch',config:'german'}).limit(25);
  if(error){box.innerHTML='<div class="empty">'+esc(error.message)+'</div>';return;}
  if(!data.length){box.innerHTML='<div class="empty">Nichts gefunden für „'+esc(q)+'".</div>';return;}
  box.innerHTML='<div class="page-sub" style="margin:4px 0 8px">'+data.length+' Treffer</div>'+data.map(d=>'<div class="sres"><div class="sf">'+esc(d.filename)+'</div><div class="sp">'+esc(d.unc_path)+'</div></div>').join('');}
async function toggleTask(id,cb){const ck=cb.checked;const{error}=await sb.from('tasks').update({status:ck?'erledigt':'offen',done_at:ck?new Date().toISOString():null}).eq('id',id);if(error){cb.checked=!ck;alert('Fehler: '+error.message);}else cb.closest('.task-card').classList.toggle('done',ck);}
async function queueAgent(agent,meta,btn){const lbl=btn?btn.textContent:'';if(btn){btn.disabled=true;btn.textContent='… eingereiht';}const{error}=await sb.from('agent_runs').insert({project_id:current,agent,status:'queued',meta});if(error){alert('Konnte Agent nicht starten: '+error.message);if(btn){btn.disabled=false;btn.textContent=lbl;}return;}loadRuns();if(btn)setTimeout(()=>{btn.disabled=false;btn.textContent=lbl;},1600);}
async function loadRuns(){const{data,error}=await sb.from('agent_runs').select('id,agent,status,result,log,started_at,project_id,projects(name)').order('created_at',{ascending:false}).limit(14);
  // Runner-Status: lief in den letzten 3 Min ein Agent oder gibt es running?
  const active=(data||[]).some(r=>r.status==='running'||(r.started_at&&Date.now()-new Date(r.started_at).getTime()<180000));
  const rs=el('rstatus');if(rs){rs.className='rstatus '+(active?'on':'off');el('rstext').textContent=active?'Runner aktiv':'Runner aus?';}
  // In-Dashboard-Banner: läuft gerade ein Agent auf DIESEM Projekt?
  const bn=el('runbanner');
  if(bn){const live=(view==='project'&&current)?(data||[]).find(r=>r.project_id===current&&(r.status==='running'||r.status==='queued')):null;
    if(live){bn.hidden=false;bn.className='runbanner';bn.innerHTML='<span class="pulse"></span>Agent läuft: <strong>'+esc(AL[live.agent]||live.agent)+'</strong> · '+(live.status==='queued'?'in Warteschlange…':'arbeitet…')+' <span class="mono">live · Fortschritt links in der Agenten-Leiste</span>';}
    else bn.hidden=true;}
  if(error){el('runs').innerHTML='<div class="empty">'+esc(error.message)+'</div>';return;}
  if(!data.length){el('runs').innerHTML='<div class="empty">Noch keine Agenten-Läufe.</div>';return;}
  let h='';for(const r of data){const pn=r.projects?short(r.projects.name):'';h+='<div class="run" data-run="'+r.id+'"><div class="rh">'+(r.status==='running'?'<span class="pulse"></span>':'')+'<span class="ra">'+esc(AL[r.agent]||r.agent)+'</span><span class="rst '+r.status+'">'+r.status+'</span></div><div class="rp">'+esc(pn)+(r.result?' · '+esc(r.result):'')+'</div>'+(openRun===r.id&&r.log?'<pre>'+esc(r.log)+'</pre>':'')+'</div>';}
  el('runs').innerHTML=h;el('runs').querySelectorAll('.run').forEach(d=>d.onclick=()=>{openRun=openRun===d.dataset.run?null:d.dataset.run;loadRuns();});}
</script>
