<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agentic OS · Gutthann HIW</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--c-navy-900:#16130F;--c-navy-800:#26231E;--c-navy-700:#4A4A46;--c-blue-700:#33302A;--c-blue-600:#16130F;--c-blue-500:#16130F;--c-blue-400:#A9A9A3;--c-blue-200:#DCDCD6;--c-blue-100:#EDEDE9;--c-blue-50:#F4F4F1;--c-slate-900:#16130F;--c-slate-800:#26231E;--c-slate-700:#4A4A46;--c-slate-600:#6B6B66;--c-slate-500:#8F8F8B;--c-slate-400:#A9A9A3;--c-slate-300:#D4D4CF;--c-slate-200:#E3E3DF;--c-slate-100:#F2F2EF;--c-slate-50:#FAFAF8;--c-white:#FFF;--c-success:#2BA049;--c-success-bg:#EEF7EE;--c-warning:#D9701E;--c-warning-bg:#FDEFE2;--c-danger:#C93A2E;--c-danger-bg:#F9E7E3;--c-amber:#D9701E;--c-amber-bg:#FDEFE2;--c-lime:#CDF000;--r-sm:9px;--r-md:13px;--r-lg:18px;--s2:8px;--s3:12px;--s4:16px;--s5:20px;--s6:24px;--s8:32px;--f-sans:'Hanken Grotesk',system-ui,sans-serif;--f-disp:'Space Grotesk',sans-serif;--f-mono:'IBM Plex Mono',ui-monospace,monospace;--sh:0 1px 2px rgba(22,19,15,.05);--sh-lift:0 10px 26px rgba(22,19,15,.11)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f-sans);font-size:13px;line-height:1.5;color:var(--c-slate-800);background:#E8E8E6;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}.mono{font-family:var(--f-mono)}
.top{background:#E8E8E6;border-bottom:1px solid rgba(22,19,15,.07);padding:11px 22px;display:flex;align-items:center;gap:13px;position:sticky;top:0;z-index:20}
.top .brand{font-family:var(--f-disp);font-size:15px;letter-spacing:-.02em;color:var(--c-navy-900);font-weight:700}
.top .crumb{font-size:14px;font-weight:600}.top .crumb a{color:var(--c-slate-500);cursor:pointer}.top .crumb a:hover{color:var(--c-blue-600)}
.top .sep{color:var(--c-slate-400);margin:0 7px}.top .right{margin-left:auto;display:flex;align-items:center;gap:12px}
.top .user{font-family:var(--f-mono);font-size:11px;color:var(--c-slate-600)}
.rstatus{font-family:var(--f-mono);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:3px 9px;border-radius:11px;display:flex;align-items:center;gap:6px}
.rstatus.on{background:var(--c-lime);color:#16130F}.rstatus.off{background:var(--c-slate-100);color:var(--c-slate-500)}
.rstatus .d{width:6px;height:6px;border-radius:50%;background:currentColor}
.lnk{font:inherit;font-size:11px;background:none;border:none;color:var(--c-blue-600);text-decoration:underline;padding:0}
.layout{display:flex;align-items:flex-start}
.main{flex:1;min-width:0;padding:22px 26px 60px;max-width:1320px;margin:0 auto}
.sidebar{width:288px;flex:0 0 288px;border-right:none;background:transparent;min-height:calc(100vh - 47px);padding:18px 15px;position:sticky;top:47px;overflow-y:auto;max-height:calc(100vh - 47px)}
.sb-proj-label{font-family:var(--f-mono);font-size:9.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--c-slate-500);margin:0 2px 14px;font-weight:600;line-height:1.3}
.menu-btn{display:none;background:none;border:1px solid var(--c-slate-300);border-radius:var(--r-md);padding:5px 10px;font-size:15px;color:var(--c-slate-700);line-height:1}
.sb-backdrop{display:none}
@media(max-width:980px){
  .sidebar{position:fixed;top:47px;left:0;bottom:0;z-index:40;width:290px;background:#E8E8E6;transform:translateX(-100%);transition:transform .22s ease;box-shadow:3px 0 16px rgba(22,19,15,.18);overflow-y:auto}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:inline-flex;align-items:center}
  .main{padding:16px 14px 60px}
  .sb-backdrop.open{display:block;position:fixed;inset:47px 0 0 0;background:rgba(22,24,29,.35);z-index:35}
}
.hdr{background:none;border:none;border-radius:0;padding:10px 4px 0;margin-bottom:var(--s4);display:grid;grid-template-columns:1fr auto;gap:var(--s5);align-items:end;box-shadow:none}
.hdr-brand{font-family:var(--f-mono);font-size:10px;color:var(--c-slate-500);letter-spacing:1.1px;text-transform:uppercase;font-weight:600}
.hdr-title{font-family:var(--f-disp);font-size:36px;font-weight:600;letter-spacing:-.03em;line-height:1.05;margin-top:8px;color:var(--c-navy-900)}
.hdr-meta{font-size:12px;color:var(--c-slate-600);margin-top:11px;display:flex;gap:var(--s5);flex-wrap:wrap}.hdr-meta strong{color:var(--c-navy-900);font-weight:600}
.hdr-status{text-align:right;font-size:10.5px;color:var(--c-slate-500);text-transform:uppercase;letter-spacing:.5px;font-family:var(--f-mono)}
.hdr-status .stamp{display:block;font-size:12px;color:var(--c-navy-900);margin-top:3px;text-transform:none;letter-spacing:0}
.pilgrim{background:var(--c-white);border:none;border-radius:20px;padding:16px 22px;margin-bottom:var(--s4);box-shadow:var(--sh)}
.pilgrim-label{font-family:var(--f-mono);font-size:10px;color:var(--c-slate-500);letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-bottom:14px}
.pilgrim-track{display:grid;grid-template-columns:repeat(9,1fr);position:relative}
.pilgrim-line{position:absolute;top:15px;left:5.5%;right:5.5%;height:2px;background:var(--c-slate-200)}
.pilgrim-line-progress{position:absolute;top:15px;left:5.5%;height:2px;background:var(--c-navy-900)}
.pilgrim-station{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;padding:2px;border-radius:var(--r-sm)}
.pilgrim-station:hover{background:var(--c-slate-50)}
.pilgrim-dot{width:30px;height:30px;border-radius:50%;background:var(--c-white);border:2px solid var(--c-slate-300);display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:12px;font-weight:600;color:var(--c-slate-500)}
.pilgrim-station.done .pilgrim-dot{background:var(--c-navy-800);border-color:var(--c-navy-800);color:#fff}
.pilgrim-station.active .pilgrim-dot{background:var(--c-navy-900);border-color:var(--c-navy-900);color:#fff;box-shadow:0 0 0 4px var(--c-lime)}
.pilgrim-labelset{font-size:10px;text-align:center;color:var(--c-slate-500);font-weight:500;line-height:1.25}
.pilgrim-station.done .pilgrim-labelset{color:var(--c-navy-700)}.pilgrim-station.active .pilgrim-labelset{color:var(--c-navy-900);font-weight:700}
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:12px;margin:0 0 var(--s5)}
.kpi{background:var(--c-white);border:none;border-radius:18px;padding:14px 16px 13px;box-shadow:var(--sh);display:flex;flex-direction:column;min-width:0}
.kpi-label{font-size:11px;color:var(--c-slate-600);font-weight:600;margin-bottom:10px;line-height:1.3}
.kpi-value{font-family:var(--f-disp);font-size:31px;font-weight:600;color:var(--c-navy-900);line-height:.9;letter-spacing:-.02em}
.kpi-unit{font-size:11px;color:var(--c-slate-500);margin-left:5px;font-family:var(--f-sans);font-weight:500;letter-spacing:0}
.kpi-sub{font-size:10.5px;color:var(--c-slate-500);margin-top:7px;line-height:1.35}
.kpi-sub .up{color:var(--c-danger);font-weight:600}.kpi-sub .okc{color:var(--c-success);font-weight:600}
.kpi.accent .kpi-value{color:var(--c-navy-900)}
.kpi.alert .kpi-value{color:var(--c-danger)}
.kpi.warn .kpi-value{color:var(--c-warning)}
.kpi-bar{height:6px;border-radius:3px;background:var(--c-slate-100);overflow:hidden;margin-top:9px}
.kpi-bar i{display:block;height:100%;border-radius:3px;background:var(--c-navy-900)}
.kpi-bar i.over{background:var(--c-danger)}
@media(max-width:1100px){.kpi-strip{gap:10px}}
/* Kennzahlen-Ziffern */
.dm{display:inline-block;vertical-align:baseline;font-variant-numeric:tabular-nums}
/* Aura-Karten: weiche Radial-Farbflächen mit Dot-Ring, Zahl in Weiß */
.aurarow{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px;margin-bottom:var(--s4);width:100%}
.aura{position:relative;min-height:240px;display:flex;align-items:center;justify-content:center;text-align:center;border:1px solid rgba(22,19,15,.08);background:var(--c-white);font:inherit;padding:0;cursor:pointer;border-radius:24px;overflow:hidden;box-shadow:var(--sh);transition:transform .15s,box-shadow .15s}
.aura:hover{transform:translateY(-2px);box-shadow:var(--sh-lift)}
.aura-bg{position:absolute;inset:0}
.aura.green .aura-bg{background:radial-gradient(130% 150% at 50% 130%,#1F9740,#4FB648 58%,#8AC049)}
.aura.amber .aura-bg{background:radial-gradient(120% 130% at 50% 130%,#EF6F28,#F0A03A 55%,#F6C96A)}
.aura-dots{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.7) 1.1px,transparent 1.9px);background-size:12px 12px;opacity:.3}
.aura-c{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:11px;color:#fff;padding:12px}
.aura-l{font-size:13px;font-weight:600;color:rgba(255,255,255,.95)}
.aura-v{display:flex;align-items:baseline;gap:5px}
.aura-pct{font-family:var(--f-disp);font-size:34px;font-weight:600;color:#fff;line-height:.95;letter-spacing:-.02em}
.aura-s{font-size:12px;font-weight:600}
.aura-foot{display:flex;gap:14px;font-size:10.5px;font-weight:600;color:rgba(255,255,255,.85);max-width:280px;flex-wrap:wrap;justify-content:center}
.aura-side{background:var(--c-white);border:none;font:inherit;text-align:left;cursor:pointer;border-radius:24px;padding:17px 18px;box-shadow:var(--sh);display:flex;flex-direction:column;gap:10px;min-height:232px;transition:box-shadow .15s,transform .15s}
.aura-side:hover{box-shadow:var(--sh-lift);transform:translateY(-2px)}
.aura-side-h{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700;color:var(--c-navy-900)}
.aura-side-h .cnt{margin-left:auto;font-family:var(--f-mono);font-size:10px;font-weight:600;background:var(--c-slate-100);color:var(--c-slate-600);padding:2px 9px;border-radius:20px}
.aura-week{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--c-slate-100)}
.aura-week:last-child{border-bottom:none}
.aura-week .dot{width:8px;height:8px;border-radius:50%;background:var(--c-danger);flex-shrink:0;margin-top:4px}
.aura-week.soon .dot{background:var(--c-warning)}
.aura-week-t{flex:1;font-size:12.5px;font-weight:600;color:var(--c-navy-900);line-height:1.35}
.aura-week-f{font-family:var(--f-mono);font-size:10.5px;color:var(--c-slate-500);white-space:nowrap}
.aura-side-foot{margin-top:auto;display:flex;align-items:center;gap:8px;padding-top:10px;border-top:1px solid var(--c-slate-100);font-size:11px;color:var(--c-slate-600)}
.aura-side-foot strong{color:var(--c-navy-900);font-weight:700}
.asf-t{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asf-f{font-family:var(--f-mono);font-size:10.5px;color:var(--c-slate-500);white-space:nowrap}
/* ── Fenster-Grid: Kacheln nebeneinander, Klick öffnet das Fenster ── */
.winboard{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-top:var(--s2);align-items:stretch;grid-auto-flow:dense}
.win{display:flex;min-width:0}
.win.prominent{grid-column:span 2}
@media(max-width:700px){.win.prominent{grid-column:span 1}}
.win-tile{flex:1;width:100%;text-align:left;background:var(--c-white);border:none;border-radius:20px;padding:16px 17px;box-shadow:var(--sh);display:flex;flex-direction:column;gap:9px;min-height:170px;cursor:pointer;position:relative;transition:box-shadow .15s,transform .15s}
.win-tile:hover{box-shadow:var(--sh-lift);transform:translateY(-2px)}
.win-tile-head{display:flex;align-items:center;gap:10px;width:100%}
.win-tx{flex:1;min-width:0;display:flex;flex-direction:column;text-align:left}
.win-sub{display:block;font-size:10.5px;color:var(--c-slate-500);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.win-ico{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--c-slate-100);color:var(--c-navy-900);flex-shrink:0}
.win.prominent .win-ico{background:radial-gradient(130% 150% at 50% 130%,#1F9740,#4FB648 58%,#8AC049);color:#fff;width:36px;height:36px;border-radius:11px}
.win.prominent .win-title{font-size:15px}
.win.prominent .win-tile{min-height:210px}
.win-badge{font-size:9.5px;font-weight:700;color:#16130F;background:var(--c-lime);padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.win-open{color:var(--c-slate-400);font-size:14px;opacity:0;transition:opacity .15s;flex-shrink:0}
.win-tile:hover .win-open{opacity:1}
.win-title{display:block;font-size:13.5px;font-weight:700;color:var(--c-navy-900);line-height:1.3}
.win-sum{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-size:11px;color:var(--c-slate-500);line-height:1.45;margin-top:3px}
.win-meta{display:flex;gap:var(--s2);align-items:center;flex-wrap:wrap;margin-top:auto}
/* Teaser: strukturierter Ausschnitt des Fensterinhalts direkt auf der Kachel */
.win-teaser{width:100%;display:flex;flex-direction:column;text-align:left}
.tz{display:flex;align-items:center;gap:8px;padding:6.5px 0;border-top:1px solid var(--c-slate-100);font-size:12px;width:100%}
.win-teaser .tz:first-child{border-top:none}
.tz-t{flex:1;min-width:0;color:var(--c-navy-800);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tz-r{font-family:var(--f-mono);font-size:10.5px;color:var(--c-slate-500);white-space:nowrap;flex-shrink:0}
.tz-more .tz-t{color:var(--c-slate-400);font-weight:500;font-size:11px}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--c-slate-300)}
.pdot.p1,.pdot.bad{background:var(--c-danger)}.pdot.p2,.pdot.warn{background:var(--c-warning)}.pdot.p3{background:var(--c-slate-400)}.pdot.ok{background:var(--c-success)}
.win-big{display:flex;align-items:flex-end;gap:8px;padding:7px 0 3px}
.win-big-u{font-size:11px;color:var(--c-slate-500);font-weight:500;padding-bottom:1px}
.win-bar{height:7px;border-radius:4px;background:var(--c-slate-100);overflow:hidden;margin:4px 0 2px;width:100%}
.win-bar i{display:block;height:100%;background:var(--c-navy-900);border-radius:4px}
.win-search{display:flex;align-items:center;gap:8px;background:var(--c-slate-50);border:1px solid var(--c-slate-200);border-radius:16px;padding:9px 13px;font-size:12px;color:var(--c-slate-400);width:100%;margin-top:6px}
.stat{font-family:var(--f-mono);font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--c-slate-100);color:var(--c-slate-700)}
.stat.alert{background:var(--c-danger-bg);color:var(--c-danger)}.stat.warn{background:var(--c-amber-bg);color:var(--c-warning)}.stat.ok{background:var(--c-success-bg);color:var(--c-success)}
/* das geöffnete Fenster */
.win-ov{position:fixed;inset:0;z-index:1000;background:rgba(22,19,15,.42);display:flex;align-items:flex-start;justify-content:center;padding:4vh 18px;overflow-y:auto}
.win-ov[hidden]{display:none}
.win-card{background:var(--c-white);border-radius:22px;box-shadow:0 30px 80px rgba(22,19,15,.28);width:100%;max-width:1060px;max-height:91vh;display:flex;flex-direction:column;overflow:hidden}
.win-head{display:flex;align-items:center;gap:13px;padding:16px 22px;border-bottom:1px solid var(--c-slate-100);flex-shrink:0}
.win .win-head .win-ico{width:38px;height:38px;border-radius:12px;font-size:17px;background:radial-gradient(130% 150% at 50% 130%,#1F9740,#4FB648 58%,#8AC049);color:#fff}
.win-head-tx{flex:1;min-width:0}
.win-head .win-title{font-family:var(--f-disp);font-size:17px;letter-spacing:-.02em}
.win-head .win-sum{display:block;-webkit-line-clamp:unset;margin-top:2px;font-size:11.5px}
.win-head .win-meta{margin-top:0}
.win-x{width:30px;height:30px;border-radius:50%;border:none;background:var(--c-slate-100);color:var(--c-slate-600);cursor:pointer;font-size:14px;line-height:1;flex-shrink:0}
.win-x:hover{background:var(--c-slate-200);color:var(--c-navy-900)}
.win-bd{overflow-y:auto;min-height:0}
.inner{padding:var(--s5) var(--s6) var(--s6)}
/* Fenster-Hero: große Kennzahlen unter dem Fensterkopf (Datum-Muster) */
.ov-hero{display:flex;gap:34px;flex-wrap:wrap;align-items:flex-end;padding:16px var(--s5) 2px}
.inner>.ov-hero{padding:2px 0 14px}
.vs-inner>.ov-hero{padding:0 0 2px}
.ov-k{display:flex;flex-direction:column;gap:4px}
.ov-k-v{font-family:var(--f-disp);font-size:30px;font-weight:600;letter-spacing:-.02em;line-height:.85;color:var(--c-navy-900);font-variant-numeric:tabular-nums}
.ov-k-u{font-size:12px;color:var(--c-slate-500);font-weight:500;font-family:var(--f-sans);letter-spacing:0}
.ov-k.ok .ov-k-v{color:var(--c-success)}.ov-k.warn .ov-k-v{color:var(--c-warning)}.ov-k.bad .ov-k-v{color:var(--c-danger)}.ov-k.mut .ov-k-v{color:var(--c-slate-500)}
.ov-k-l{font-size:10.5px;color:var(--c-slate-500);font-weight:500}
.tasks-tabs{background:var(--c-slate-50);border-bottom:1px solid var(--c-slate-200);display:flex;padding:0 var(--s5);overflow-x:auto}
.tab-btn{background:none;border:none;padding:11px 13px;font-size:12px;color:var(--c-slate-600);font-weight:600;white-space:nowrap;border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px}
.tab-btn:hover{color:var(--c-navy-800)}.tab-btn.active{color:var(--c-navy-900);border-bottom-color:var(--c-blue-600)}
.tab-count{font-family:var(--f-mono);min-width:20px;padding:2px 6px;border-radius:10px;background:var(--c-slate-200);color:var(--c-slate-700);font-size:10px;text-align:center}
.tab-btn.active .tab-count{background:var(--c-blue-600);color:#fff}
.tasks-filters{padding:9px var(--s5);border-bottom:1px solid var(--c-slate-200);display:flex;gap:var(--s3);align-items:center;flex-wrap:wrap}
#addtaskform{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:11px var(--s5);background:var(--c-blue-50);border-bottom:1px solid var(--c-slate-200)}
#addtaskform[hidden]{display:none}
.filter-label{font-family:var(--f-mono);font-size:9.5px;color:var(--c-slate-500);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.fc{background:var(--c-slate-100);border:1px solid var(--c-slate-200);color:var(--c-slate-700);padding:3px 9px;border-radius:11px;font-size:10.5px;font-weight:600;cursor:pointer}
.fc.active{background:var(--c-navy-900);border-color:var(--c-navy-900);color:#fff}.fc.s1.active{background:var(--c-danger);border-color:var(--c-danger)}.fc.s2.active{background:var(--c-amber);border-color:var(--c-amber)}
.task-card{border-bottom:1px solid var(--c-slate-200)}.task-card:last-child{border-bottom:none}.task-card.hide{display:none}.task-card.expanded{border-left:3px solid var(--c-blue-600)}
.task-head{width:100%;padding:11px var(--s5);display:grid;grid-template-columns:20px 1fr auto 16px;gap:var(--s3);align-items:center;cursor:pointer}.task-head:hover{background:var(--c-slate-50)}
.tcheck{width:18px;height:18px;accent-color:var(--c-success);cursor:pointer}

/* Doku-Check · LPH-Vollständigkeit */
.dc-strip{display:grid;grid-template-columns:repeat(9,1fr);gap:6px;margin-bottom:var(--s4)}
.dc-chip{height:34px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:13px;font-weight:700;border:1px solid}
.dc-chip.ok{background:var(--c-success-bg);color:var(--c-success);border-color:#BfDcc6}
.dc-chip.warn{background:var(--c-amber-bg);color:var(--c-warning);border-color:#E6D29A}
.dc-chip.bad{background:var(--c-danger-bg);color:var(--c-danger);border-color:#E3B7B6}
.dc-chip.off{background:var(--c-slate-100);color:var(--c-slate-400);border-color:var(--c-slate-200)}
.dc-list{display:flex;flex-direction:column;gap:7px}
.dc-ph{background:var(--c-white);border:1px solid var(--c-slate-200);border-left:3px solid var(--c-slate-300);border-radius:var(--r-md);box-shadow:var(--sh);overflow:hidden}
.dc-ph.ok{border-left-color:var(--c-success)}.dc-ph.warn{border-left-color:var(--c-amber)}.dc-ph.bad{border-left-color:var(--c-danger)}.dc-ph.off{opacity:.7}
.dc-sum{list-style:none;cursor:pointer;padding:11px 15px;display:flex;align-items:center;gap:var(--s3)}
.dc-sum::-webkit-details-marker{display:none}
.dc-sum:hover{background:var(--c-slate-50)}
.dc-lph{font-family:var(--f-mono);font-size:11px;font-weight:700;color:var(--c-blue-700);min-width:48px}
.dc-name{font-size:13px;font-weight:600;color:var(--c-navy-900);flex:1}
.dc-badge{font-family:var(--f-mono);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 8px;border-radius:9px}
.dc-badge.ok{background:var(--c-success-bg);color:var(--c-success)}.dc-badge.warn{background:var(--c-amber-bg);color:var(--c-warning)}.dc-badge.bad{background:var(--c-danger-bg);color:var(--c-danger)}.dc-badge.off{background:var(--c-slate-100);color:var(--c-slate-500)}
.dc-counts{font-family:var(--f-mono);font-size:10.5px;color:var(--c-slate-500);white-space:nowrap}
.dc-body{padding:4px 15px 14px;border-top:1px solid var(--c-slate-100)}
.dc-gl{display:grid;grid-template-columns:18px 1fr auto;gap:var(--s3);align-items:center;padding:6px 0;border-bottom:1px solid var(--c-slate-100);font-size:12px}
.dc-gl:last-child{border-bottom:none}
.dc-ic{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.dc-ic.ok{background:var(--c-success)}.dc-ic.warn{background:var(--c-amber)}.dc-ic.bad{background:var(--c-danger)}
.dc-soll{color:var(--c-navy-900)}
.dc-beleg{font-family:var(--f-mono);font-size:10px;color:var(--c-slate-500);text-align:right;max-width:46%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dc-beleg.fehlt{color:var(--c-danger)}
.dc-luecken{margin-top:10px;background:var(--c-amber-bg);border:1px solid #E6D29A;border-radius:var(--r-sm);padding:9px 12px}
.dc-luecken-h{font-family:var(--f-mono);font-size:9px;letter-spacing:.6px;text-transform:uppercase;color:var(--c-warning);font-weight:700;margin-bottom:5px}
.dc-luecke{font-size:11.5px;color:var(--c-navy-800);padding:3px 0;line-height:1.4;display:flex;gap:7px}
.dc-luecke:before{content:"△";color:var(--c-warning);flex-shrink:0}
.login{max-width:360px;margin:9vh auto 0;background:var(--c-white);border:1px solid var(--c-slate-200);border-radius:var(--r-lg);box-shadow:var(--sh);padding:30px 28px}
.login .brand{font-family:var(--f-mono);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--c-blue-600);font-weight:600}
.login h2{font-family:var(--f-disp);font-size:22px;font-weight:600;letter-spacing:-.02em;margin:6px 0 22px;color:var(--c-navy-900)}
.login label{display:block;font-family:var(--f-mono);font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--c-slate-500);margin:14px 0 6px}
.login input{width:100%;font-family:var(--f-sans);font-size:14px;padding:10px 12px;border:1px solid var(--c-slate-300);border-radius:var(--r-md);background:var(--c-slate-50)}
.login input:focus{outline:none;border-color:var(--c-blue-600);background:#fff}
.login button{width:100%;margin-top:22px;font-size:14px;font-weight:600;padding:11px;border:none;border-radius:22px;background:var(--c-navy-900);color:#fff}
.login .err{color:var(--c-danger);font-size:12px;margin-top:13px;min-height:1em}
</style>

function renderRaumGrafik(rp){const raeume=(rp.raeume||[]).filter(r=>r&&r.name&&(+r.flaeche_m2>0));if(!raeume.length)return '';
  // Funktionsdiagramm: jeder Raum = Rechteck, Flaeche masstaeblich zur EINZELRAUM-m2 (flaeche_m2 ist Gesamtflaeche der anzahl Raeume).

    h+='</div></div>';}

  if(error){el('runs').innerHTML='<div class="empty">'+esc(error.message)+'</div>';return;}
  if(!data.length){el('runs').innerHTML='<div class="empty">Noch keine Agenten-Läufe.</div>';return;}
  let h='';for(const r of data){const pn=r.projects?short(r.projects.name):'';h+='<div class="run" data-run="'+r.id+'"><div class="rh">'+(r.status==='running'?'<span class="pulse"></span>':'')+'<span class="ra">'+esc(AL[r.agent]||r.agent)+'</span><span class="rst '+r.status+'">'+r.status+'</span></div><div class="rp">'+esc(pn)+(r.result?' · '+esc(r.result):'')+'</div>'+(openRun===r.id&&r.log?'<pre>'+esc(r.log)+'</pre>':'')+'</div>';}
  el('runs').innerHTML=h;el('runs').querySelectorAll('.run').forEach(d=>d.onclick=()=>{openRun=openRun===d.dataset.run?null:d.dataset.run;loadRuns();});}
</script>
</body>
</html>
